name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4/libadwaita dev libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Build CLI + fix helper (release)
        run: cargo build --release -p sysmedic-cli -p sysmedic-daemon
      - name: Smoke-run checkup
        run: ./target/release/sysmedic checkup --format json | head -c 2000
      - name: Smoke-run fix listing
        run: ./target/release/sysmedic fix
      - name: Smoke-run advanced tools
        run: |
          ./target/release/sysmedic disk . --depth 1 --top 5
          ./target/release/sysmedic network
      - name: Smoke-run follow-up tools
        run: |
          ./target/release/sysmedic monitor --quiet
          ./target/release/sysmedic history
          ./target/release/sysmedic schedule status
      - name: Smoke-run deep-explain fallback (no API key -> offline answer)
        run: ./target/release/sysmedic explain storage.disk_nearly_full --deep
      - name: Build & verify the .deb
        run: |
          cargo build --release -p sysmedic-gui
          packaging/deb/build-deb.sh
          dpkg-deb --info sysmedic_*.deb
          dpkg-deb --contents sysmedic_*.deb | grep -q usr/bin/sysmedic
