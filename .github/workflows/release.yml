name: Release

# Build distributable artifacts when a v* tag is pushed, and attach them to the
# GitHub release. Also runnable on demand from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  deb:
    name: Build .deb (+ AppDir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4/libadwaita dev libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --locked -p sysmedic-cli -p sysmedic-daemon -p sysmedic-gui
      - name: Build .deb
        run: packaging/deb/build-deb.sh
      - name: Assemble AppDir
        run: packaging/appimage/build-appimage.sh || true
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysmedic-deb
          path: sysmedic_*.deb
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: sysmedic_*.deb
          draft: true
          generate_release_notes: true
