name: Pages

# Publish the static landing page (docs/site) to GitHub Pages. Enable Pages with
# "GitHub Actions" as the source in the repository settings for this to deploy.
on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "docs/screenshots/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Assemble site (index + screenshots at the root)
        run: |
          mkdir -p _site/screenshots
          cp docs/site/index.html _site/index.html
          cp docs/screenshots/*.png _site/screenshots/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
